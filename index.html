<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlow Demo</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.section {
  padding: 40px;
}

.btn {
  padding: 10px 20px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
}

.step {
  background: #1a1a1a;
  padding: 15px;
  margin: 10px 0;
  border-left: 4px solid red;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="section">
  <h1>Easy to Join. Hard to Leave.</h1>
  <p>Roach Motel Dark Pattern Demo</p>
  <button class="btn" onclick="goTo(2)">Start Free Trial</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="section" style="display:none;">
  <h2>ROACH MOTEL</h2>
  <p>
    A subscription service that is easy to sign up for but hard to cancel.
  </p>

  <button class="btn" onclick="goTo(3)">Continue</button>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="section" style="display:none;">
  <h2>Cancellation Maze</h2>

  <div class="step" onclick="openPopup()">Step 1: Verify account</div>
  <div class="step" onclick="openOffer()">Step 2: Discount offer</div>
  <div class="step" onclick="openFinal()">Step 3: Final confirmation</div>
</div>

<!-- POPUP 1 -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <div style="background:#111; padding:20px;">
    <h3>Verify Email</h3>
    <input id="emailInput" placeholder="Enter email">
    <br><br>
    <button onclick="submitEmail()">Verify</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- POPUP 2 -->
<div id="offerPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <div style="background:#111; padding:20px;">
    <h3>🎉 50% OFF</h3>
    <button onclick="stay()">Stay</button>
    <button onclick="closeOffer()">No thanks</button>
  </div>
</div>

<!-- POPUP 3 -->
<div id="finalPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <div style="background:#111; padding:20px;">
    <h3>😢 We’ll miss you</h3>
    <button onclick="cancel()">Cancel Anyway</button>
    <button onclick="closeFinal()">Go Back</button>
  </div>
</div>

<script>
function goTo(num) {
  document.getElementById("screen1").style.display = "none";
  document.getElementById("screen2").style.display = "none";
  document.getElementById("screen3").style.display = "none";
  document.getElementById("screen" + num).style.display = "block";
}

// STEP 1
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
function submitEmail() {
  alert("Verification sent!");
  closePopup();
}

// STEP 2
function openOffer() {
  document.getElementById("offerPopup").style.display = "flex";
}
function closeOffer() {
  document.getElementById("offerPopup").style.display = "none";
}
function stay() {
  alert("You stayed subscribed!");
  closeOffer();
}

// STEP 3
function openFinal() {
  document.getElementById("finalPopup").style.display = "flex";
}
function closeFinal() {
  document.getElementById("finalPopup").style.display = "none";
}
function cancel() {
  alert("Subscription cancelled.");
}
</script>

</body>
</html>
